<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Cinthia Carimbos</title>
    <a href="{{ url_for('logout') }}">Sair</a>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<section class="admin-container">

    <h1>Painel Administrativo</h1>

    <div class="admin-card">
        <h2>Cadastrar Produto</h2>

        <form action="{{ url_for('novo_produto') }}" method="POST" enctype="multipart/form-data" class="form-admin">
            <input type="text" name="nome" placeholder="Nome do produto" required>

            <input type="text" name="descricao" placeholder="Descrição do produto" required>

            <input type="number" step="0.01" name="preco" placeholder="Preço" required>

            <input type="file" name="imagem" accept="image/*" required>

            <button type="submit">Cadastrar Produto</button>
        </form>
    </div>

    <div class="admin-card">
        <h2>Produtos Cadastrados</h2>

        <div class="tabela-admin">

            <div class="linha-admin cabecalho-admin">
                <span>Imagem</span>
                <span>Produto</span>
                <span>Preço</span>
                <span>Ações</span>
            </div>

            {% for produto in produtos %}
            <div class="linha-admin">
                <span>
                    {% if produto.imagem %}
                        <img src="{{ url_for('static', filename='img/' + produto.imagem) }}" class="img-admin">
                    {% else %}
                        Sem imagem
                    {% endif %}
                </span>

                <span>{{ produto.nome }}</span>

                <span>R$ {{ "%.2f"|format(produto.preco) }}</span>

                <span class="acoes-admin">
                    <a href="{{ url_for('editar_produto', id=produto.id) }}" class="btn-editar">
                        Editar
                    </a>

                    <a href="{{ url_for('excluir_produto', id=produto.id) }}"
                       class="btn-excluir"
                       onclick="return confirm('Deseja realmente excluir este produto?')">
                        Excluir
                    </a>
                </span>
            </div>
            {% endfor %}

        </div>
    </div>

</section>

</body>
</html>
